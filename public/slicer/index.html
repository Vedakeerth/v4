<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAELINSA - 3D Print Slicer & Quote</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { 
            font-size: 2.5rem; 
            margin-bottom: 2rem;
            background: linear-gradient(to right, #06b6d4, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        
        @media (max-width: 1024px) {
            .grid { grid-template-columns: 1fr; }
        }
        
        /* 3D Preview */
        #preview-container {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
        }
        #preview { 
            width: 100%; 
            height: 600px; 
            border-radius: 8px;
            display: block;
        }
        
        /* Controls Panel */
        #controls {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
        }
        .control-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 0.875rem;
            font-weight: 500;
        }
        input[type="file"],
        input[type="email"],
        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 1rem;
        }
        input[type="range"] {
            width: 100%;
            accent-color: #06b6d4;
            height: 6px;
        }
        
        button {
            width: 100%;
            padding: 14px 24px;
            margin: 8px 0;
            background: #06b6d4;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { 
            background: #0891b2; 
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }
        button:disabled { 
            opacity: 0.5; 
            cursor: not-allowed;
            transform: none;
        }
        button.secondary { 
            background: #334155; 
            color: #e2e8f0; 
        }
        button.secondary:hover {
            background: #475569;
        }
        
        /* Quote Display */
        #quote {
            background: linear-gradient(135deg, #06b6d4 0%, #6366f1 100%);
            padding: 24px;
            border-radius: 12px;
            margin-top: 20px;
        }
        #quote h3 { margin-bottom: 16px; color: #fff; }
        #quote table { width: 100%; border-collapse: collapse; color: #fff; }
        #quote td { padding: 8px 0; }
        #quote .total { 
            font-size: 1.5rem; 
            font-weight: 700; 
            padding-top: 16px; 
            border-top: 2px solid rgba(255,255,255,0.3); 
        }
        
        .hidden { display: none !important; }
        .status { 
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            text-align: center;
            font-size: 0.875rem;
        }
        .status.success { background: #10b981; color: white; }
        .status.error { background: #ef4444; color: white; }
        .status.info { background: #3b82f6; color: white; }
        
        #model-info {
            margin-top: 12px;
            font-size: 0.875rem;
            color: #94a3b8;
            padding: 12px;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 8px;
            border-left: 3px solid #06b6d4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖨️ VAELINSA 3D Print Slicer</h1>
        
        <div class="grid">
            <!-- Left: 3D Preview -->
            <div id="preview-container">
                <canvas id="preview"></canvas>
                <div id="model-info" class="hidden">
                    <strong>Model Info:</strong><br>
                    <span id="dimensions"></span>
                </div>
            </div>
            
            <!-- Right: Controls -->
            <div id="controls">
                <div class="control-group">
                    <label>📁 Upload STL File</label>
                    <input type="file" id="stlFile" accept=".stl">
                </div>
                
                <div class="control-group">
                    <label>✉️ Your Email</label>
                    <input type="email" id="userEmail" placeholder="you@example.com">
                </div>
                
                <div class="control-group">
                    <label>🧪 Material</label>
                    <select id="material">
                        <option value="PLA">PLA - ₹160/kg</option>
                        <option value="ABS">ABS - ₹200/kg</option>
                        <option value="PETG">PETG - ₹180/kg</option>
                        <option value="TPU">TPU - ₹280/kg</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label>🎨 Color</label>
                    <select id="color">
                        <option value="#06b6d4">Cyan</option>
                        <option value="#ffffff">White</option>
                        <option value="#000000">Black</option>
                        <option value="#ef4444">Red</option>
                        <option value="#22c55e">Green</option>
                        <option value="#eab308">Yellow</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label>📏 Scale: <span id="scaleValue">100%</span></label>
                    <input type="range" id="scale" min="25" max="400" value="100" step="5">
                </div>
                
                <div class="control-group">
                    <label>🔲 Infill Density: <span id="infillValue">20%</span></label>
                    <input type="range" id="infill" min="0" max="100" value="20" step="5">
                </div>
                
                <div class="control-group">
                    <label>🎫 Promo Code (Optional)</label>
                    <input type="text" id="promo" placeholder="SAVE10, SAVE20, PLA15">
                </div>
                
                <button onclick="sliceAndQuote()" id="quoteBtn" disabled>
                    🔄 Generate Quote & Slice
                </button>
                
                <button onclick="sendToPrinter()" id="sendBtn" class="hidden">
                    📤 Send to Print Queue
                </button>
                
                <button onclick="downloadGCODE()" id="downloadBtn" class="secondary hidden">
                    ⬇️ Download G-code
                </button>
                
                <div id="status" class="hidden"></div>
                
                <!-- Quote Display -->
                <div id="quote" class="hidden"></div>
            </div>
        </div>
    </div>
    
    <!-- Three.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/STLLoader.js"></script>
    
    <!-- Core Logic -->
    <script src="slicer.js"></script>
</body>
</html>
